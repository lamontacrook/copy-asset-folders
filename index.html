<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AEM Assets Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f4f6f9;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 620px;
      overflow: hidden;
    }

    .card-header {
      background: #1473e6;
      padding: 1.5rem 2rem;
    }

    .card-header h1 { color: #fff; font-size: 1.2rem; font-weight: 600; }
    .card-header p  { color: rgba(255,255,255,0.75); font-size: 0.82rem; margin-top: 0.3rem; }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      border-bottom: 2px solid #eef0f3;
      background: #fafbfc;
    }

    .tab {
      padding: 0.85rem 1.5rem;
      font-size: 0.88rem;
      font-weight: 600;
      color: #777;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: color 0.15s, border-color 0.15s;
      user-select: none;
    }

    .tab:hover { color: #1473e6; }
    .tab.active { color: #1473e6; border-bottom-color: #1473e6; }

    .tab-panel { display: none; padding: 2rem; }
    .tab-panel.active { display: block; }

    /* ── Shared form styles ── */
    .section-title {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #999;
      margin-bottom: 1rem;
    }

    .field { margin-bottom: 1.2rem; }

    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: #2c2c2c;
      margin-bottom: 0.4rem;
    }

    label .hint { font-weight: 400; color: #888; margin-left: 0.3rem; }

    input, textarea, select {
      width: 100%;
      padding: 0.6rem 0.85rem;
      border: 1.5px solid #d5d8dc;
      border-radius: 6px;
      font-size: 0.9rem;
      color: #1a1a1a;
      background: #fafafa;
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
      font-family: inherit;
    }

    input:focus, textarea:focus, select:focus {
      border-color: #1473e6;
      box-shadow: 0 0 0 3px rgba(20,115,230,0.12);
      background: #fff;
    }

    input::placeholder, textarea::placeholder { color: #aaa; }
    textarea { resize: vertical; min-height: 80px; line-height: 1.5; }

    .divider { height: 1px; background: #eef0f3; margin: 1.5rem 0; }

    .btn {
      width: 100%;
      padding: 0.75rem;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      color: #fff;
    }

    .btn-primary          { background: #1473e6; }
    .btn-primary:hover    { background: #0f5fc7; }
    .btn-primary:active   { transform: scale(0.99); }
    .btn-primary:disabled { background: #9bbce8; cursor: not-allowed; }

    .btn-row {
      display: flex;
      gap: 0.75rem;
    }

    .btn-row .btn { flex: 1; }

    .btn-outline {
      background: #fff;
      color: #1473e6;
      border: 1.5px solid #1473e6;
    }

    .btn-outline:hover    { background: #eaf3ff; }
    .btn-outline:disabled { opacity: 0.5; cursor: not-allowed; }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 0.4rem;
    }

    .spinner-dark {
      border-color: rgba(20,115,230,0.25);
      border-top-color: #1473e6;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Privilege checkboxes ── */
    .priv-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem 1rem;
    }

    .priv-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
      color: #2c2c2c;
      cursor: pointer;
    }

    .priv-item input[type="checkbox"] {
      width: auto;
      padding: 0;
      border: none;
      cursor: pointer;
      accent-color: #1473e6;
    }

    .priv-group-label {
      font-size: 0.75rem;
      font-weight: 700;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin: 0.75rem 0 0.4rem;
    }

    /* ── Effect toggle ── */
    .effect-toggle {
      display: flex;
      gap: 0;
      border: 1.5px solid #d5d8dc;
      border-radius: 6px;
      overflow: hidden;
    }

    .effect-toggle label {
      flex: 1;
      margin: 0;
      text-align: center;
      padding: 0.55rem;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      color: #555;
      background: #fafafa;
      transition: background 0.15s, color 0.15s;
    }

    .effect-toggle input[type="radio"] { display: none; }

    .effect-toggle input[type="radio"]:checked + label.allow {
      background: #edfaf1; color: #2d9d5f;
    }

    .effect-toggle input[type="radio"]:checked + label.deny {
      background: #fff3f2; color: #d7373f;
    }

    /* ── Status / result boxes ── */
    .status {
      margin-top: 1.25rem;
      border-radius: 6px;
      padding: 0.85rem 1rem;
      font-size: 0.85rem;
      line-height: 1.5;
      display: none;
    }

    .status.success { display: block; background: #edfaf1; border: 1.5px solid #2d9d5f; color: #1a6e3f; }
    .status.error   { display: block; background: #fff3f2; border: 1.5px solid #d7373f; color: #9e1c22; }
    .status.info    { display: block; background: #eaf3ff; border: 1.5px solid #1473e6; color: #0d4a9e; }

    .status pre {
      margin-top: 0.5rem;
      white-space: pre-wrap;
      word-break: break-all;
      font-size: 0.76rem;
      opacity: 0.85;
    }

    /* ── Current ACL table ── */
    #aclTable { display: none; margin-top: 1.25rem; }

    .acl-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }

    .acl-table th {
      text-align: left;
      padding: 0.45rem 0.75rem;
      background: #f4f6f9;
      color: #555;
      font-weight: 700;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .acl-table td {
      padding: 0.45rem 0.75rem;
      border-bottom: 1px solid #eef0f3;
      color: #2c2c2c;
      vertical-align: top;
    }

    .acl-table tr:last-child td { border-bottom: none; }

    .pill {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 99px;
      font-size: 0.72rem;
      font-weight: 700;
    }

    .pill-allow { background: #edfaf1; color: #2d9d5f; }
    .pill-deny  { background: #fff3f2; color: #d7373f; }

    /* ── Create & Copy tab results ── */
    #results { margin-top: 1.5rem; display: none; }

    .folder-row {
      border: 1.5px solid #eef0f3;
      border-radius: 8px;
      margin-bottom: 0.75rem;
      overflow: hidden;
    }

    .folder-row-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.65rem 1rem;
      background: #fafbfc;
      cursor: pointer;
      user-select: none;
    }

    .folder-row-header:hover { background: #f0f4f9; }

    .folder-name { font-size: 0.88rem; font-weight: 600; color: #1a1a1a; flex: 1; }
    .row-title   { font-weight: 400; color: #888; margin-left: 0.4rem; font-size: 0.82rem; }

    .badge {
      font-size: 0.72rem;
      font-weight: 700;
      padding: 0.2rem 0.55rem;
      border-radius: 99px;
      white-space: nowrap;
    }

    .badge-pending { background: #eef0f3; color: #777; }
    .badge-running { background: #eaf3ff; color: #1473e6; }
    .badge-ok      { background: #edfaf1; color: #2d9d5f; }
    .badge-err     { background: #fff3f2; color: #d7373f; }
    .badge-partial { background: #fff8e6; color: #c77b00; }

    .chevron { font-size: 0.7rem; color: #aaa; transition: transform 0.2s; }
    .folder-row.open .chevron { transform: rotate(90deg); }

    .folder-row-body {
      display: none;
      padding: 0.75rem 1rem;
      border-top: 1px solid #eef0f3;
    }

    .folder-row.open .folder-row-body { display: block; }

    .step-line {
      font-size: 0.8rem;
      color: #555;
      margin-bottom: 0.4rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .step-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .dot-ok      { background: #2d9d5f; }
    .dot-err     { background: #d7373f; }
    .dot-pending { background: #ccc; }
    .dot-running { background: #1473e6; }

    .progress-bar-wrap {
      background: #eef0f3;
      border-radius: 99px;
      height: 6px;
      overflow: hidden;
      margin: 0.5rem 0 0.25rem;
    }

    .progress-bar-fill {
      height: 100%;
      background: #2d9d5f;
      border-radius: 99px;
      transition: width 0.25s ease;
      width: 0%;
    }

    .progress-label { font-size: 0.75rem; color: #777; text-align: right; }

    .asset-log {
      margin-top: 0.6rem;
      max-height: 160px;
      overflow-y: auto;
      border: 1px solid #eef0f3;
      border-radius: 6px;
    }

    .asset-log-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.25rem 0.75rem;
      font-size: 0.76rem;
      border-bottom: 1px solid #f4f6f9;
      color: #444;
    }

    .asset-log-row:last-child { border-bottom: none; }

    #summary {
      display: none;
      margin-top: 1rem;
      padding: 0.85rem 1rem;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    #summary.ok      { background: #edfaf1; border: 1.5px solid #2d9d5f; color: #1a6e3f; }
    #summary.partial { background: #fff8e6; border: 1.5px solid #e8a800; color: #7a5000; }
    #summary.err     { background: #fff3f2; border: 1.5px solid #d7373f; color: #9e1c22; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <h1>AEM Assets Manager</h1>
      <p>author-p186976-e1967129.adobeaemcloud.com</p>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <div class="tab active" data-tab="create">Copy Folders</div>
      <div class="tab" data-tab="permissions">Permissions</div>
    </div>

    <!-- ══════════════════════════════════════════════════════════
         Tab 1 — Copy Folders
    ═══════════════════════════════════════════════════════════ -->
    <div class="tab-panel active" id="tab-create">

      <p class="section-title">Connection</p>

      <div class="field">
        <label for="host">AEM Host</label>
        <input id="host" type="url"
          value="https://author-p186976-e1967129.adobeaemcloud.com"
          placeholder="https://author-p186976-e1967129.adobeaemcloud.com" />
      </div>

      <div class="field">
        <label for="token">Bearer Token</label>
        <input id="token" type="password"
          placeholder="Paste your IMS bearer token" autocomplete="off" />
      </div>

      <div class="divider"></div>
      <p class="section-title">Source</p>

      <div class="field">
        <label for="sourcePath">Source Folder</label>
        <input id="sourcePath" type="text"
          value="/content/dam/seat-00"
          placeholder="/content/dam/seat-00" />
      </div>

      <div class="divider"></div>
      <p class="section-title">Destinations</p>

      <div class="field">
        <label for="parentPath">Parent DAM Path</label>
        <input id="parentPath" type="text"
          value="/content/dam"
          placeholder="/content/dam or /content/dam/my-project" />
      </div>

      <div class="field">
        <label for="folderNames">
          Destinations
          <span class="hint">(one per line or comma-separated — use <code style="font-size:0.8em">name | Title</code> to set a display title)</span>
        </label>
        <textarea id="folderNames" placeholder="seat-01&#10;seat-02 | Seat 02&#10;seat-03 | Seat 03"></textarea>
      </div>

      <button class="btn btn-primary" id="runBtn" type="button">
        Copy Folders
      </button>

      <div id="results"></div>
      <div id="summary"></div>
    </div>

    <!-- ══════════════════════════════════════════════════════════
         Tab 2 — Permissions
    ═══════════════════════════════════════════════════════════ -->
    <div class="tab-panel" id="tab-permissions">

      <p class="section-title">Connection</p>

      <div class="field">
        <label for="p-host">AEM Host</label>
        <input id="p-host" type="url"
          value="https://author-p186976-e1967129.adobeaemcloud.com"
          placeholder="https://author-p186976-e1967129.adobeaemcloud.com" />
      </div>

      <div class="field">
        <label for="p-token">Bearer Token</label>
        <input id="p-token" type="password"
          placeholder="Paste your IMS bearer token" autocomplete="off" />
      </div>

      <div class="divider"></div>
      <p class="section-title">Folder</p>

      <div class="field">
        <label for="p-folderPath">DAM Folder Path</label>
        <input id="p-folderPath" type="text"
          placeholder="/content/dam/my-project/seat-01" />
      </div>

      <div class="btn-row" style="margin-bottom:1.2rem">
        <button class="btn btn-outline" id="loadAclBtn" type="button">
          Load Current Permissions
        </button>
      </div>

      <!-- Current ACL table (shown after load) -->
      <div id="aclTable">
        <p class="section-title">Current Permissions</p>
        <table class="acl-table" id="aclTableBody">
          <thead>
            <tr>
              <th>Principal</th>
              <th>Effect</th>
              <th>Privileges</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <div class="divider"></div>
      <p class="section-title">Set Permission</p>

      <div class="field">
        <label for="p-principal">Principal ID
          <span class="hint">(user or group name)</span>
        </label>
        <input id="p-principal" type="text" placeholder="contributor, dam-users, admin…" />
      </div>

      <div class="field">
        <label>Effect</label>
        <div class="effect-toggle">
          <input type="radio" name="effect" id="eff-allow" value="allow" checked />
          <label for="eff-allow" class="allow">Allow</label>
          <input type="radio" name="effect" id="eff-deny" value="deny" />
          <label for="eff-deny" class="deny">Deny</label>
        </div>
      </div>

      <div class="field">
        <label>Privileges</label>
        <p class="priv-group-label">Common</p>
        <div class="priv-grid">
          <label class="priv-item"><input type="checkbox" value="jcr:read" checked /> Read</label>
          <label class="priv-item"><input type="checkbox" value="jcr:write" /> Write</label>
          <label class="priv-item"><input type="checkbox" value="jcr:modifyProperties" /> Modify Properties</label>
          <label class="priv-item"><input type="checkbox" value="jcr:addChildNodes" /> Add Child Nodes</label>
          <label class="priv-item"><input type="checkbox" value="jcr:removeNode" /> Remove Node</label>
          <label class="priv-item"><input type="checkbox" value="jcr:removeChildNodes" /> Remove Child Nodes</label>
        </div>
        <p class="priv-group-label">Advanced</p>
        <div class="priv-grid">
          <label class="priv-item"><input type="checkbox" value="jcr:readAccessControl" /> Read Access Control</label>
          <label class="priv-item"><input type="checkbox" value="jcr:modifyAccessControl" /> Modify Access Control</label>
          <label class="priv-item"><input type="checkbox" value="jcr:versionManagement" /> Version Management</label>
          <label class="priv-item"><input type="checkbox" value="jcr:lockManagement" /> Lock Management</label>
          <label class="priv-item"><input type="checkbox" value="crx:replicate" /> Replicate</label>
          <label class="priv-item"><input type="checkbox" value="rep:write" /> Rep Write</label>
        </div>
      </div>

      <button class="btn btn-primary" id="applyPermBtn" type="button">
        Apply Permissions
      </button>

      <div class="status" id="permStatus"></div>
    </div>

  </div><!-- .card -->

  <script>
    const $ = (id) => document.getElementById(id);

    // ── Tab switching ─────────────────────────────────────────────────────────
    document.querySelectorAll('.tab').forEach((tab) => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach((t) => t.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach((p) => p.classList.remove('active'));
        tab.classList.add('active');
        $('tab-' + tab.dataset.tab).classList.add('active');
      });
    });

    // ════════════════════════════════════════════════════════════
    // Tab 1 — Copy Folders
    // ════════════════════════════════════════════════════════════

    $('runBtn').addEventListener('click', run);

    // Parse "name | title" entries from the textarea (comma or newline separated).
    function parseFolderEntries(raw) {
      return raw
        .split(/[\n,]+/)
        .map((s) => s.trim())
        .filter(Boolean)
        .map((entry) => {
          const [name, ...rest] = entry.split('|');
          const folderName  = name.trim();
          const folderTitle = rest.length ? rest.join('|').trim() : folderName;
          return { folderName, folderTitle };
        });
    }

    async function run() {
      const host       = $('host').value.trim().replace(/\/$/, '');
      const token      = $('token').value.trim();
      const parentPath = $('parentPath').value.trim().replace(/\/$/, '');
      const sourcePath = $('sourcePath').value.trim().replace(/\/$/, '');
      const entries    = parseFolderEntries($('folderNames').value);

      if (!host || !token || !parentPath || !sourcePath || entries.length === 0) {
        alert('Please fill in all fields and provide at least one destination folder name.');
        return;
      }

      setBtn('runBtn', true, 'Copying…');
      $('summary').style.display = 'none';

      const resultsEl = $('results');
      resultsEl.innerHTML = '';
      resultsEl.style.display = 'block';

      const rows = entries.map(({ folderName, folderTitle }) =>
        buildRow(resultsEl, folderName, folderTitle));

      let ok = 0, errs = 0;

      for (let i = 0; i < entries.length; i++) {
        const { folderName, folderTitle } = entries[i];
        const row      = rows[i];
        const destPath = `${parentPath}/${folderName}`;

        setRowBadge(row, 'running', 'Copying…');
        row.el.classList.add('open');

        // ── Step 1: Copy folder ──
        addStepRow(row, 'running', 'Copying folder…');
        let copyOk = false;
        try {
          const r = await fetch('/proxy/copy-asset', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ host, token, sourcePath, destPath }),
          });

          if (r.status === 201 || r.status === 200) {
            updateLastStep(row, 'ok', `Folder copied → ${destPath}`);
            copyOk = true;
          } else {
            const msg = await r.text();
            updateLastStep(row, 'err', `Copy failed — HTTP ${r.status}`);
            row.detail.textContent = msg;
            row.detail.style.display = 'block';
            setRowBadge(row, 'err', 'Failed');
            errs++;
          }
        } catch (e) {
          updateLastStep(row, 'err', `Copy error — ${e.message}`);
          setRowBadge(row, 'err', 'Error');
          errs++;
        }

        // ── Step 2: Set title (only if copy succeeded and title differs from name) ──
        if (copyOk) {
          if (folderTitle !== folderName) {
            addStepRow(row, 'running', `Setting title to "${folderTitle}"…`);
            try {
              const r = await fetch('/proxy/update-folder', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ host, token, folderPath: destPath, folderTitle }),
              });

              if (r.status === 200 || r.status === 204) {
                updateLastStep(row, 'ok', `Title set to "${folderTitle}"`);
              } else {
                updateLastStep(row, 'err', `Title update failed — HTTP ${r.status}`);
              }
            } catch (e) {
              updateLastStep(row, 'err', `Title update error — ${e.message}`);
            }
          }

          setRowBadge(row, 'ok', 'Done');
          ok++;
        }

        row.el.classList.remove('open');
      }

      const total = folderNames.length;
      const s = $('summary');
      s.style.display = 'block';
      if (errs === 0) {
        s.className = 'ok';
        s.textContent = `Done — ${ok} folder${ok !== 1 ? 's' : ''} copied successfully.`;
      } else if (ok > 0) {
        s.className = 'partial';
        s.textContent = `Completed with issues — ${ok}/${total} folders copied, ${errs} failed.`;
      } else {
        s.className = 'err';
        s.textContent = `All ${total} folder copies failed.`;
      }

      setBtn('runBtn', false, 'Copy Folders');
    }

    // ════════════════════════════════════════════════════════════
    // Tab 2 — Permissions
    // ════════════════════════════════════════════════════════════

    $('loadAclBtn').addEventListener('click', async () => {
      const host       = $('p-host').value.trim().replace(/\/$/, '');
      const token      = $('p-token').value.trim();
      const folderPath = $('p-folderPath').value.trim();

      if (!host || !token || !folderPath) {
        showStatus('permStatus', 'error', 'Please fill in host, token, and folder path.');
        return;
      }

      setBtn('loadAclBtn', true, 'Loading…', true);
      hideStatus('permStatus');
      $('aclTable').style.display = 'none';

      try {
        const res = await fetch('/proxy/get-permissions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ host, token, folderPath }),
        });

        const text = await res.text();

        if (res.ok) {
          let data;
          try { data = JSON.parse(text); } catch { data = null; }

          if (data && typeof data === 'object') {
            renderAclTable(data);
          } else {
            showStatus('permStatus', 'info', 'No structured ACL data returned.', text);
          }
        } else {
          showStatus('permStatus', 'error', `Failed to load permissions (HTTP ${res.status}).`, text);
        }
      } catch (err) {
        showStatus('permStatus', 'error', `Network error: ${err.message}`);
      } finally {
        setBtn('loadAclBtn', false, 'Load Current Permissions', true);
      }
    });

    $('applyPermBtn').addEventListener('click', async () => {
      const host       = $('p-host').value.trim().replace(/\/$/, '');
      const token      = $('p-token').value.trim();
      const folderPath = $('p-folderPath').value.trim();
      const principal  = $('p-principal').value.trim();
      const effect     = document.querySelector('input[name="effect"]:checked').value;
      const privileges = [...document.querySelectorAll('.priv-grid input[type="checkbox"]:checked')]
        .map((cb) => cb.value);

      if (!host || !token || !folderPath || !principal) {
        showStatus('permStatus', 'error', 'Please fill in host, token, folder path, and principal.');
        return;
      }

      if (privileges.length === 0) {
        showStatus('permStatus', 'error', 'Select at least one privilege.');
        return;
      }

      setBtn('applyPermBtn', true, 'Applying…');
      hideStatus('permStatus');

      try {
        const res = await fetch('/proxy/set-permissions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ host, token, folderPath, principalId: principal, privileges, effect }),
        });

        const text = await res.text();
        const pretty = tryPretty(text);

        if (res.ok || res.status === 200) {
          showStatus('permStatus', 'success',
            `Permissions applied — ${effect.toUpperCase()} ${privileges.join(', ')} for "${principal}" on ${folderPath}.`,
            pretty);
        } else {
          showStatus('permStatus', 'error', `Failed (HTTP ${res.status}).`, pretty);
        }
      } catch (err) {
        showStatus('permStatus', 'error', `Network error: ${err.message}`);
      } finally {
        setBtn('applyPermBtn', false, 'Apply Permissions');
      }
    });

    function renderAclTable(data) {
      const tbody = $('aclTableBody').querySelector('tbody');
      tbody.innerHTML = '';

      // rep:policy node — each child is a rep:GrantACE or rep:DenyACE entry.
      // Filter out JCR metadata keys (jcr:*, rep:primaryType, etc.)
      const aces = Object.values(data).filter(
        (v) => v && typeof v === 'object' && (
          v['jcr:primaryType'] === 'rep:GrantACE' ||
          v['jcr:primaryType'] === 'rep:DenyACE'
        )
      );

      if (aces.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3" style="color:#aaa;text-align:center;padding:1rem">No ACEs found on this folder</td></tr>';
      } else {
        for (const ace of aces) {
          const principal = ace['rep:principalName'] || '(unknown)';
          const isAllow   = ace['jcr:primaryType'] === 'rep:GrantACE';
          const privs     = ace['rep:privileges'] || [];
          const privList  = privs.length
            ? privs.map((p) => `<code style="font-size:0.75rem">${escapeHtml(p)}</code>`).join(' ')
            : '—';

          const row = document.createElement('tr');
          row.innerHTML = `
            <td>${escapeHtml(principal)}</td>
            <td><span class="pill ${isAllow ? 'pill-allow' : 'pill-deny'}">${isAllow ? 'Allow' : 'Deny'}</span></td>
            <td>${privList}</td>`;
          tbody.appendChild(row);
        }
      }

      $('aclTable').style.display = 'block';
    }

    // ── Shared API helpers ────────────────────────────────────────────────────

    // ── DOM helpers ───────────────────────────────────────────────────────────

    function buildRow(container, name, title) {
      const el = document.createElement('div');
      el.className = 'folder-row';
      const subtitle = title && title !== name
        ? `<span class="row-title">${escapeHtml(title)}</span>` : '';
      el.innerHTML = `
        <div class="folder-row-header">
          <span class="chevron">&#9654;</span>
          <span class="folder-name">${escapeHtml(name)}${subtitle}</span>
          <span class="badge badge-pending">Pending</span>
        </div>
        <div class="folder-row-body">
          <div class="step-list"></div>
          <pre class="step-detail" style="display:none;margin-top:0.5rem;font-size:0.75rem;white-space:pre-wrap;word-break:break-all;color:#9e1c22;opacity:0.85"></pre>
        </div>`;

      el.querySelector('.folder-row-header').addEventListener('click', () => el.classList.toggle('open'));
      container.appendChild(el);

      return {
        el,
        badge:    el.querySelector('.badge'),
        stepList: el.querySelector('.step-list'),
        detail:   el.querySelector('.step-detail'),
      };
    }

    function addStepRow(row, state, text) {
      const line = document.createElement('div');
      line.className = 'step-line';
      line.innerHTML = `<span class="step-dot dot-${state}"></span><span class="step-text">${escapeHtml(text)}</span>`;
      row.stepList.appendChild(line);
      return line;
    }

    function updateLastStep(row, state, text) {
      const lines = row.stepList.querySelectorAll('.step-line');
      const last  = lines[lines.length - 1];
      if (!last) return;
      last.querySelector('.step-dot').className = `step-dot dot-${state}`;
      last.querySelector('.step-text').textContent = text;
    }

    function setRowBadge(row, type, text) {
      row.badge.className = `badge badge-${type}`;
      row.badge.textContent = text;
    }

    function setStepDot(el, state) {
      if (el) el.className = `step-dot dot-${state}`;
    }

    function setBtn(id, disabled, label, outline = false) {
      const btn = $(id);
      btn.disabled = disabled;
      const spinnerClass = outline ? 'spinner spinner-dark' : 'spinner';
      btn.innerHTML = disabled ? `<span class="${spinnerClass}"></span>${label}` : label;
    }

    function showStatus(id, type, message, detail) {
      const el = $(id);
      el.className = `status ${type}`;
      el.innerHTML = `<strong>${escapeHtml(message)}</strong>${detail ? `<pre>${escapeHtml(detail)}</pre>` : ''}`;
    }

    function hideStatus(id) {
      const el = $(id);
      el.className = 'status';
      el.textContent = '';
    }

    function tryPretty(text) {
      try { return JSON.stringify(JSON.parse(text), null, 2); } catch { return text; }
    }

    function escapeHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
